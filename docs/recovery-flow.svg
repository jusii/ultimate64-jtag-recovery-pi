<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 22px; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #555; }
    .stage-box { fill: #fff; stroke: #222; stroke-width: 2; rx: 8; }
    .stage-title { font-size: 16px; font-weight: 700; }
    .stage-body { font-size: 12px; fill: #444; }
    .ok-box { fill: #e9f7ee; stroke: #27a25c; stroke-width: 2; }
    .warn-box { fill: #fdf2e2; stroke: #d4a35d; stroke-width: 2; }
    .danger-box { fill: #fdedef; stroke: #c0392b; stroke-width: 2; }
    .arrow { stroke: #444; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .arrow-success { stroke: #27a25c; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
    .layer-label { font-size: 11px; font-weight: 700; fill: #888; text-anchor: middle; }
    .layer-row { fill: #f4f4f4; stroke: #ccc; stroke-dasharray: 3,3; }
    .volatile { font-size: 10px; fill: #1f77b4; font-style: italic; }
    .persistent { font-size: 10px; fill: #c0392b; font-style: italic; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#444"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#27a25c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="32" class="title" text-anchor="middle">Commodore 64 Ultimate / Ultimate 64 Elite II — JTAG recovery flow</text>
  <text x="550" y="54" class="subtitle" text-anchor="middle">Stages 0-2 are volatile (RAM-only). Stage 3 (run from menu) is the persistent fix.</text>

  <!-- Layer rows -->
  <rect x="20" y="100" width="1060" height="60" class="layer-row"/>
  <text x="40" y="135" class="layer-label">Pi GPIO</text>

  <rect x="20" y="180" width="1060" height="120" class="layer-row"/>
  <text x="40" y="225" class="layer-label">FPGA fabric</text>
  <text x="40" y="245" class="volatile" text-anchor="middle">(volatile)</text>

  <rect x="20" y="320" width="1060" height="80" class="layer-row"/>
  <text x="40" y="365" class="layer-label">RISC-V DRAM</text>
  <text x="40" y="385" class="volatile" text-anchor="middle">(volatile)</text>

  <rect x="20" y="420" width="1060" height="80" class="layer-row"/>
  <text x="40" y="465" class="layer-label">Flash partitions</text>
  <text x="40" y="485" class="persistent" text-anchor="middle">(PERSISTENT)</text>

  <!-- ============ Stage 0: Smoke test (read IDCODE) ============ -->
  <rect x="100" y="105" width="200" height="50" class="stage-box ok-box"/>
  <text x="200" y="125" class="stage-title" text-anchor="middle">Stage 0</text>
  <text x="200" y="142" class="stage-body" text-anchor="middle">read IDCODE via xc3sprog</text>
  <text x="200" y="155" class="stage-body" text-anchor="middle" font-style="italic">read-only — no writes</text>

  <!-- ============ Stage 1: FPGA load ============ -->
  <rect x="350" y="185" width="200" height="110" class="stage-box"/>
  <text x="450" y="205" class="stage-title" text-anchor="middle">Stage 1</text>
  <text x="450" y="223" class="stage-body" text-anchor="middle">openFPGALoader / xc3sprog</text>
  <text x="450" y="240" class="stage-body" text-anchor="middle">load u64_mk2_artix.bit</text>
  <text x="450" y="263" class="stage-body" text-anchor="middle">→ Recovery FPGA fabric</text>
  <text x="450" y="278" class="stage-body" text-anchor="middle" font-style="italic">(BSCANE2 user bridge live)</text>

  <!-- ============ Stage 2: DRAM upload + boot ============ -->
  <rect x="600" y="325" width="200" height="80" class="stage-box"/>
  <text x="700" y="345" class="stage-title" text-anchor="middle">Stage 2</text>
  <text x="700" y="363" class="stage-body" text-anchor="middle">recover.py</text>
  <text x="700" y="378" class="stage-body" text-anchor="middle">upload ultimate.bin → DRAM</text>
  <text x="700" y="393" class="stage-body" text-anchor="middle">+ boot magic + release reset</text>

  <!-- Stage 2.5: bridge confirms boot -->
  <rect x="850" y="325" width="220" height="60" class="stage-box ok-box"/>
  <text x="960" y="345" class="stage-title" text-anchor="middle" fill="#27a25c">✓ 0xdead1541</text>
  <text x="960" y="365" class="stage-body" text-anchor="middle">bridge IDCODE confirms</text>
  <text x="960" y="378" class="stage-body" text-anchor="middle">recovery firmware booted</text>

  <!-- ============ Stage 3: Permanent flash ============ -->
  <rect x="350" y="425" width="380" height="70" class="stage-box danger-box"/>
  <text x="540" y="445" class="stage-title" text-anchor="middle">Stage 3 — DON'T SKIP</text>
  <text x="540" y="463" class="stage-body" text-anchor="middle">From recovered menu, run a known-good update.ue2 from USB stick</text>
  <text x="540" y="478" class="stage-body" text-anchor="middle">→ writes FPGA + ROMs + ESP32 + ultimate.app + HTML to flash (PERMANENT)</text>

  <!-- ============ Arrows between stages ============ -->
  <!-- Stage 0 → Stage 1 -->
  <path class="arrow-success" d="M 200 158 C 200 180, 350 180, 350 220"/>
  <text x="285" y="180" class="stage-body" font-style="italic" fill="#27a25c">✓ chain works</text>

  <!-- Stage 1 → Stage 2 -->
  <path class="arrow-success" d="M 450 298 C 450 320, 600 360, 600 365"/>
  <text x="540" y="318" class="stage-body" font-style="italic" fill="#27a25c">✓ FPGA configured</text>

  <!-- Stage 2 → bridge confirm -->
  <path class="arrow-success" d="M 800 365 L 850 355"/>

  <!-- Stage 2 (HDMI) → Stage 3 -->
  <path class="arrow" d="M 700 408 C 700 425, 600 460, 540 425"/>
  <text x="610" y="425" class="stage-body" font-style="italic">menu visible on HDMI</text>

  <!-- Stage 3 outcome (auto-reboot) -->
  <rect x="780" y="425" width="200" height="70" class="stage-box ok-box"/>
  <text x="880" y="445" class="stage-title" text-anchor="middle" fill="#27a25c">Recovered ✓</text>
  <text x="880" y="463" class="stage-body" text-anchor="middle">Device reboots normally;</text>
  <text x="880" y="478" class="stage-body" text-anchor="middle">JTAG cable can be removed</text>
  <path class="arrow-success" d="M 730 460 L 780 460"/>

  <!-- ============ "What gets touched" annotations ============ -->
  <g transform="translate(20, 535)">
    <text x="0" y="0" class="stage-title" font-size="14px">What each stage actually writes</text>
    <text x="0" y="20" class="stage-body">
      <tspan font-weight="700">Stage 0:</tspan> nothing (read-only IDCODE).
      <tspan font-weight="700"> Stage 1:</tspan> FPGA fabric only — volatile, reverts on power-cycle.
    </text>
    <text x="0" y="38" class="stage-body">
      <tspan font-weight="700">Stage 2:</tspan> DRAM only — volatile, reverts on power-cycle.
      <tspan font-weight="700"> Stage 3:</tspan> Q-SPI flash — PERMANENT.
    </text>
    <text x="0" y="60" class="stage-body" fill="#c0392b" font-weight="700">
      Until Stage 3 completes, every power-cycle reverts the device to its bricked flash state.
    </text>
  </g>
</svg>
