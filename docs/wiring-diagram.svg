<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="Helvetica, Arial, sans-serif">
  <style>
    .title { font-size: 22px; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #555; }
    .pin-num { font-size: 10px; fill: #333; text-anchor: middle; }
    .pin-fn  { font-size: 11px; fill: #444; }
    .pin-fn-bold { font-size: 11px; font-weight: 700; }
    .signal-tck { fill: #d62728; }
    .signal-tms { fill: #1f77b4; }
    .signal-tdi { fill: #2ca02c; }
    .signal-tdo { fill: #ff7f0e; }
    .signal-gnd { fill: #555; }
    .header-box { fill: #fff; stroke: #222; stroke-width: 2; }
    .pin-circle { fill: #fff; stroke: #444; stroke-width: 1; }
    .pin-power { fill: #ffe2a8; stroke: #d4a35d; }
    .pin-gnd { fill: #888; stroke: #444; }
    .pin-used { stroke-width: 2; }
    .wire-tck { stroke: #d62728; stroke-width: 2.5; fill: none; }
    .wire-tms { stroke: #1f77b4; stroke-width: 2.5; fill: none; }
    .wire-tdi { stroke: #2ca02c; stroke-width: 2.5; fill: none; }
    .wire-tdo { stroke: #ff7f0e; stroke-width: 2.5; fill: none; }
    .wire-gnd { stroke: #555;    stroke-width: 2.5; fill: none; stroke-dasharray: 5,3; }
    .legend-text { font-size: 12px; fill: #333; }
    .warn { font-size: 12px; fill: #c00; font-weight: 700; }
    .note { font-size: 12px; fill: #555; }
  </style>

  <!-- Title -->
  <text x="550" y="32" class="title" text-anchor="middle">Raspberry Pi GPIO ↔ Commodore 64 Ultimate / Ultimate 64 Elite II (P5 JTAG header)</text>
  <text x="550" y="54" class="subtitle" text-anchor="middle">Pin assignments match xc3sprog matrix_creator / gpiod_creator / LinuxJedi 2025 Pi-JTAG layout</text>

  <!-- ============== Pi GPIO 40-pin header ============== -->
  <g transform="translate(60, 100)">
    <text x="180" y="-10" class="title" text-anchor="middle" font-size="16px">Raspberry Pi (40-pin GPIO header)</text>

    <!-- Header outline -->
    <rect x="20" y="0" width="320" height="600" class="header-box" rx="6"/>

    <!-- Pin layout: 2 columns x 20 rows; left column = odd pins, right = even pins -->
    <!-- Each row: y = 14 + (row-1)*30; pin diameter = 18 -->

    <!-- Helper macro: we hand-draw all 40 pins with labels. -->

    <!-- Row 1: Pin 1 (3.3V), Pin 2 (5V) -->
    <circle cx="60" cy="20" r="9" class="pin-circle pin-power"/><text x="60" y="24" class="pin-num">1</text>
    <text x="78" y="24" class="pin-fn">3.3V</text>
    <circle cx="280" cy="20" r="9" class="pin-circle pin-power"/><text x="280" y="24" class="pin-num">2</text>
    <text x="220" y="24" class="pin-fn" text-anchor="end">5V</text>

    <!-- Row 2: Pin 3 (SDA), Pin 4 (5V) -->
    <circle cx="60" cy="50" r="9" class="pin-circle"/><text x="60" y="54" class="pin-num">3</text>
    <text x="78" y="54" class="pin-fn">GPIO2 / SDA</text>
    <circle cx="280" cy="50" r="9" class="pin-circle pin-power"/><text x="280" y="54" class="pin-num">4</text>
    <text x="220" y="54" class="pin-fn" text-anchor="end">5V</text>

    <!-- Row 3: Pin 5 (SCL), Pin 6 (GND) -->
    <circle cx="60" cy="80" r="9" class="pin-circle"/><text x="60" y="84" class="pin-num">5</text>
    <text x="78" y="84" class="pin-fn">GPIO3 / SCL</text>
    <circle cx="280" cy="80" r="9" class="pin-circle pin-gnd"/><text x="280" y="84" class="pin-num" fill="#fff">6</text>
    <text x="220" y="84" class="pin-fn" text-anchor="end">GND</text>

    <!-- Row 4: Pin 7 (GPIO4 ← TMS) — USED, Pin 8 (GPIO14) -->
    <circle cx="60" cy="110" r="11" class="pin-circle pin-used signal-tms"/><text x="60" y="114" class="pin-num" fill="#fff">7</text>
    <text x="78" y="114" class="pin-fn-bold signal-tms">GPIO 4   ◄── TMS</text>
    <circle cx="280" cy="110" r="9" class="pin-circle"/><text x="280" y="114" class="pin-num">8</text>
    <text x="220" y="114" class="pin-fn" text-anchor="end">GPIO14 / TXD</text>

    <!-- Row 5: Pin 9 (GND) — USED for GND, Pin 10 (GPIO15) -->
    <circle cx="60" cy="140" r="11" class="pin-circle pin-used pin-gnd"/><text x="60" y="144" class="pin-num" fill="#fff">9</text>
    <text x="78" y="144" class="pin-fn-bold signal-gnd">GND      ◄── GND</text>
    <circle cx="280" cy="140" r="9" class="pin-circle"/><text x="280" y="144" class="pin-num">10</text>
    <text x="220" y="144" class="pin-fn" text-anchor="end">GPIO15 / RXD</text>

    <!-- Row 6: Pin 11 (GPIO17 ← TCK), Pin 12 (GPIO18) -->
    <circle cx="60" cy="170" r="11" class="pin-circle pin-used signal-tck"/><text x="60" y="174" class="pin-num" fill="#fff">11</text>
    <text x="78" y="174" class="pin-fn-bold signal-tck">GPIO 17  ◄── TCK</text>
    <circle cx="280" cy="170" r="9" class="pin-circle"/><text x="280" y="174" class="pin-num">12</text>
    <text x="220" y="174" class="pin-fn" text-anchor="end">GPIO18</text>

    <!-- Row 7: Pin 13 (GPIO27 ← TDO), Pin 14 (GND) -->
    <circle cx="60" cy="200" r="11" class="pin-circle pin-used signal-tdo"/><text x="60" y="204" class="pin-num" fill="#fff">13</text>
    <text x="78" y="204" class="pin-fn-bold signal-tdo">GPIO 27  ◄── TDO</text>
    <circle cx="280" cy="200" r="9" class="pin-circle pin-gnd"/><text x="280" y="204" class="pin-num" fill="#fff">14</text>
    <text x="220" y="204" class="pin-fn" text-anchor="end">GND</text>

    <!-- Row 8: Pin 15 (GPIO22 ← TDI), Pin 16 (GPIO23) -->
    <circle cx="60" cy="230" r="11" class="pin-circle pin-used signal-tdi"/><text x="60" y="234" class="pin-num" fill="#fff">15</text>
    <text x="78" y="234" class="pin-fn-bold signal-tdi">GPIO 22  ◄── TDI</text>
    <circle cx="280" cy="230" r="9" class="pin-circle"/><text x="280" y="234" class="pin-num">16</text>
    <text x="220" y="234" class="pin-fn" text-anchor="end">GPIO23</text>

    <!-- Row 9: Pin 17 (3.3V), Pin 18 (GPIO24) -->
    <circle cx="60" cy="260" r="9" class="pin-circle pin-power"/><text x="60" y="264" class="pin-num">17</text>
    <text x="78" y="264" class="pin-fn">3.3V</text>
    <circle cx="280" cy="260" r="9" class="pin-circle"/><text x="280" y="264" class="pin-num">18</text>
    <text x="220" y="264" class="pin-fn" text-anchor="end">GPIO24</text>

    <!-- Row 10: Pin 19 (GPIO10), Pin 20 (GND) -->
    <circle cx="60" cy="290" r="9" class="pin-circle"/><text x="60" y="294" class="pin-num">19</text>
    <text x="78" y="294" class="pin-fn">GPIO10 / MOSI</text>
    <circle cx="280" cy="290" r="9" class="pin-circle pin-gnd"/><text x="280" y="294" class="pin-num" fill="#fff">20</text>
    <text x="220" y="294" class="pin-fn" text-anchor="end">GND</text>

    <!-- Rows 11-20 condensed — just a "..." block -->
    <text x="180" y="338" class="note" text-anchor="middle">⋮</text>
    <text x="180" y="356" class="note" text-anchor="middle">remaining pins (21..40) not used</text>
    <text x="180" y="374" class="note" text-anchor="middle">⋮</text>

    <!-- A label line at bottom -->
    <text x="180" y="580" class="note" text-anchor="middle" font-style="italic">(USB-C / power side at top in this orientation)</text>
  </g>

  <!-- ============== C64U P5 JTAG header ============== -->
  <g transform="translate(820, 220)">
    <text x="100" y="-10" class="title" text-anchor="middle" font-size="16px">C64U P5 JTAG (10-pin 2×5)</text>
    <text x="100" y="6" class="subtitle" text-anchor="middle">DLC9LP-compatible pinout</text>

    <rect x="0" y="20" width="200" height="200" class="header-box" rx="6"/>

    <!-- 5 rows × 2 cols. Odd pins on left, even on right. -->
    <!-- Row 1: pin 1 (TCK), pin 2 (GND) -->
    <circle cx="40" cy="50" r="11" class="pin-circle pin-used signal-tck"/><text x="40" y="54" class="pin-num" fill="#fff">1</text>
    <text x="58" y="54" class="pin-fn-bold signal-tck">TCK ──►</text>
    <circle cx="160" cy="50" r="11" class="pin-circle pin-used pin-gnd"/><text x="160" y="54" class="pin-num" fill="#fff">2</text>
    <text x="142" y="54" class="pin-fn-bold signal-gnd" text-anchor="end">GND ──►</text>

    <!-- Row 2: pin 3 (TDO), pin 4 -->
    <circle cx="40" cy="84" r="11" class="pin-circle pin-used signal-tdo"/><text x="40" y="88" class="pin-num" fill="#fff">3</text>
    <text x="58" y="88" class="pin-fn-bold signal-tdo">TDO ──►</text>
    <circle cx="160" cy="84" r="9" class="pin-circle pin-power"/><text x="160" y="88" class="pin-num">4</text>
    <text x="142" y="88" class="pin-fn" text-anchor="end">3.3V (do not connect)</text>

    <!-- Row 3: pin 5 (TMS), pin 6 -->
    <circle cx="40" cy="118" r="11" class="pin-circle pin-used signal-tms"/><text x="40" y="122" class="pin-num" fill="#fff">5</text>
    <text x="58" y="122" class="pin-fn-bold signal-tms">TMS ──►</text>
    <circle cx="160" cy="118" r="9" class="pin-circle"/><text x="160" y="122" class="pin-num">6</text>
    <text x="142" y="122" class="pin-fn" text-anchor="end">N/C</text>

    <!-- Row 4: pin 7, pin 8 -->
    <circle cx="40" cy="152" r="9" class="pin-circle"/><text x="40" y="156" class="pin-num">7</text>
    <text x="58" y="156" class="pin-fn">N/C</text>
    <circle cx="160" cy="152" r="9" class="pin-circle"/><text x="160" y="156" class="pin-num">8</text>
    <text x="142" y="156" class="pin-fn" text-anchor="end">N/C</text>

    <!-- Row 5: pin 9 (TDI), pin 10 (GND) -->
    <circle cx="40" cy="186" r="11" class="pin-circle pin-used signal-tdi"/><text x="40" y="190" class="pin-num" fill="#fff">9</text>
    <text x="58" y="190" class="pin-fn-bold signal-tdi">TDI ──►</text>
    <circle cx="160" cy="186" r="11" class="pin-circle pin-gnd"/><text x="160" y="190" class="pin-num" fill="#fff">10</text>
    <text x="142" y="190" class="pin-fn signal-gnd" text-anchor="end">GND (alt)</text>
  </g>

  <!-- ============== Wires (Pi → C64U) ============== -->
  <!-- TMS: Pi pin 7 (cx=120, cy=210) → C64U P5 pin 5 (cx=860, cy=338) -->
  <path class="wire-tms" d="M 132 210 C 380 210, 600 338, 848 338"/>
  <!-- TCK: Pi pin 11 (cx=120, cy=270) → C64U P5 pin 1 (cx=860, cy=270) -->
  <path class="wire-tck" d="M 132 270 C 400 270, 600 270, 848 270"/>
  <!-- TDO: Pi pin 13 (cx=120, cy=300) → C64U P5 pin 3 (cx=860, cy=304) -->
  <path class="wire-tdo" d="M 132 300 C 400 300, 600 304, 848 304"/>
  <!-- TDI: Pi pin 15 (cx=120, cy=330) → C64U P5 pin 9 (cx=860, cy=406) -->
  <path class="wire-tdi" d="M 132 330 C 400 330, 600 406, 848 406"/>
  <!-- GND: Pi pin 9 (cx=120, cy=240) → C64U P5 pin 2 (cx=980, cy=270) [or pin 10 cy=406] -->
  <path class="wire-gnd" d="M 132 240 C 400 240, 700 270, 968 270"/>

  <!-- ============== Legend ============== -->
  <g transform="translate(60, 660)">
    <text x="0" y="0" class="title" font-size="14px">Legend</text>
    <line x1="0" y1="20" x2="40" y2="20" class="wire-tck"/>
    <text x="48" y="24" class="legend-text"><tspan class="signal-tck" font-weight="700">TCK</tspan>  Test Clock</text>
    <line x1="160" y1="20" x2="200" y2="20" class="wire-tms"/>
    <text x="208" y="24" class="legend-text"><tspan class="signal-tms" font-weight="700">TMS</tspan>  Test Mode Select</text>
    <line x1="340" y1="20" x2="380" y2="20" class="wire-tdi"/>
    <text x="388" y="24" class="legend-text"><tspan class="signal-tdi" font-weight="700">TDI</tspan>  Test Data In</text>
    <line x1="510" y1="20" x2="550" y2="20" class="wire-tdo"/>
    <text x="558" y="24" class="legend-text"><tspan class="signal-tdo" font-weight="700">TDO</tspan>  Test Data Out</text>
    <line x1="690" y1="20" x2="730" y2="20" class="wire-gnd"/>
    <text x="738" y="24" class="legend-text"><tspan class="signal-gnd" font-weight="700">GND</tspan>  Ground</text>
  </g>

  <!-- ============== Warning ============== -->
  <g transform="translate(60, 700)">
    <text x="0" y="14" class="warn">⚠ DO NOT CONNECT 3.3V (Pi pin 1 or 17) to C64U P5 pin 4 — back-feeds C64U PSU.</text>
    <text x="0" y="34" class="note">Use either Pi pin 9 OR pin 14 OR pin 20 for GND. Use either C64U P5 pin 2 OR pin 10 for GND. One is enough.</text>
  </g>
</svg>
